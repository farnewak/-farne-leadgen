# Chain-branch URL patterns. Entries describe branch-page URL shapes for
# well-known Austrian B2C chains. Rows whose discovered URL matches are
# REMOVED from the stage1 output stream and logged to
# logs/filtered_chain_branches.csv.
#
# Pattern semantics:
#   - Single `*` is greedy and matches one or more characters (including `/`).
#   - Patterns are matched against the normalised host+path form
#     (`<hostname-without-www><pathname>`).
#   - Hostnames are IDN-aware: both unicode and punycode forms of the URL
#     resolve to the same pattern entry.
#   - `spar.at/` (plain homepage) does NOT match `spar.at/standorte/*` —
#     chain apex-dedupe handles bad chain homepages in a later stage.
#
# Keep the list sorted by chain_name so diffs stay readable.
- pattern: "anker.at/filialen*"
  chain_name: "Anker"
  reason: "B2C bakery chain — branch page"
- pattern: "baeckerei-felber.at/*"
  chain_name: "Felber"
  reason: "B2C bakery chain — branch page"
- pattern: "billa.at/filialen/*"
  chain_name: "Billa"
  reason: "B2C supermarket chain — branch page"
- pattern: "billa-corso.at/*"
  chain_name: "Billa Corso"
  reason: "B2C supermarket chain — branch page"
