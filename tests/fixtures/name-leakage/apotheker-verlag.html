<body>
<!--
  Reconstructed fixture for the Phase 6 Bezirk-1010 bug observation
  (osm:node:333302666, https://www.deineapotheke.at/impressum-kontakt).

  Reproduces the exact stored `impressum_company_name` (100 chars) after
  cheerio `$('body').text()` + `.replace(/\s+/g, ' ')` normalisation:

    Österreichische Apotheker-Verlagsgesellschaft m.b.H.Unternehmensgegenstand:Herausgabe und Verschleiß

  The LABELED_NAME_REGEX matches `Medieninhaber:` here; the capture
  group then runs unbounded for 100 chars because the `<strong>` and
  `<span>` children of one `<p>` concatenate in `.text()` without
  interior whitespace (note: NO space between `</strong>` and
  `<span>Unternehmensgegenstand:</span>` and between that `</span>`
  and the following `<span>Herausgabe…</span>`). This is why the
  100-char overflow pattern survives even if `.replace(/\s+/g, " ")`
  is removed — the bug is bodied entirely inside a single flat
  paragraph with no newline boundaries.

  Phase 7b fix: Layer C (downstream keyword-stop sanitizer) trims at
  "Unternehmensgegenstand" and yields
  "Österreichische Apotheker-Verlagsgesellschaft m.b.H." (52 chars).
-->
<main>
  <h1>Impressum</h1>
  <p>Medieninhaber: <strong>Österreichische Apotheker-Verlagsgesellschaft m.b.H.</strong><span>Unternehmensgegenstand:</span><span>Herausgabe und Verschleiß</span> von Fachliteratur für das österreichische Apothekenwesen.</p>
  <p>Spitalgasse 31a, 1090 Wien</p>
  <p>UID: ATU12345678</p>
</main>
</body>
</html>
